<!DOCTYPE html>
<html>
<head>
    <title>Your Website</title>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js"></script>
</head>
<body>
    <header>
        <h1>Welcome to Our Website</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">Hakkında</a>
                    <ul class="dropdown">
                        <li><a href="#faq">FAQ</a></li>
                        <li><a href="rules.html">Kurallar</a></li>
                    </ul>
                </li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="#newsletter">Newsletter</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="faq">
            <h2>Frequently Asked Questions</h2>
            <div class="accordion">
                <div class="accordion-item">
                    <h3 class="accordion-header">Question 1</h3>
                    <div class="accordion-body">
                        <p>Answer to question 1.</p>
                    </div>
                </div>
                <div class="accordion-item">
                    <h3 class="accordion-header">Question 2</h3>
                    <div class="accordion-body">
                        <p>Answer to question 2.</p>
                    </div>
                </div>
                <div class="accordion-item">
                    <h3 class="accordion-header">Question 3</h3>
                    <div class="accordion-body">
                        <p>Answer to question 3.</p>
                    </div>
                </div>
            </div>
        </section>

        <section id="newsletter">
            <h2>Newsletter Subscription</h2>
            <form>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <button type="submit">Subscribe</button>
            </form>
        </section>
    </main>

    <footer>
        <p>© 2026 Your Website</p>
    </footer>
    <script>
        document.querySelectorAll('.accordion-header').forEach(header => {
            header.addEventListener('click', () => {
                const body = header.nextElementSibling;
                body.style.display = body.style.display === 'block' ? 'none' : 'block';
            });
        });
    </script>
</body>
</html>
