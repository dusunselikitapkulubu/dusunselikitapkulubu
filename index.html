<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Düşünseli Kitap Kulübü</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F7F5F0; --surface: #FFFFFF; --ink: #1A1A18; --muted: #8A8880;
      --accent: #C8502A; --border: #E5E2DA;
      --serif: 'Playfair Display', Georgia, serif; --sans: 'DM Sans', sans-serif;
    }
    html { font-size: 16px; scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--ink); font-family: var(--sans); font-weight: 300; min-height: 100vh; opacity: 0; animation: fadeIn 0.8s ease forwards; }
    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes slideUp { to { opacity: 1; transform: none; } }
    @keyframes pageFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

    header { position: sticky; top: 0; z-index: 100; background: rgba(247,245,240,0.88); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 clamp(1.5rem,5vw,4rem); display: flex; align-items: center; justify-content: space-between; height: 64px; }
    .logo { display: flex; align-items: center; gap: 0.5rem; font-family: var(--serif); font-size: 1rem; color: var(--ink); text-decoration: none; letter-spacing: -0.01em; cursor: pointer; }
    .logo-img { height: 64px; width: 64px; flex-shrink: 0; }
    .logo span { color: var(--accent); }
    nav { display: flex; gap: 2rem; list-style: none; align-items: center; }
    nav a { font-size: 0.85rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.2s; cursor: pointer; }
    nav a:hover { color: var(--ink); }
    nav a.active { color: var(--accent); }
    .nav-dropdown { position: relative; }
    .nav-dropdown > a { display: flex; align-items: center; gap: 0.3rem; }
    .nav-dropdown > a::after { content: ''; display: inline-block; width: 6px; height: 6px; border-right: 1.5px solid currentColor; border-bottom: 1.5px solid currentColor; transform: rotate(45deg) translateY(-2px); transition: transform 0.2s; }
    .nav-dropdown:hover > a::after { transform: rotate(225deg) translateY(-2px); }
    .dropdown-menu { position: absolute; top: calc(100% + 1rem); right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; min-width: 180px; padding: 0.5rem 0; box-shadow: 0 8px 24px rgba(0,0,0,0.08); opacity: 0; visibility: hidden; transform: translateY(-6px); transition: opacity 0.2s, transform 0.2s, visibility 0.2s; z-index: 200; }
    .nav-dropdown:hover .dropdown-menu { opacity: 1; visibility: visible; transform: translateY(0); }
    .dropdown-menu a { display: block; padding: 0.6rem 1.2rem; font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); text-decoration: none; transition: color 0.15s, background 0.15s; cursor: pointer; }
    .dropdown-menu a:hover { color: var(--accent); background: var(--bg); }
    .dropdown-divider { height: 1px; background: var(--border); margin: 0.4rem 0; }

    .page { display: none; }
    .page.active { display: block; }
    .page.fade-in { animation: pageFade 0.35s ease forwards; }

    .hero { padding: clamp(4rem,10vw,8rem) clamp(1.5rem,5vw,4rem); max-width: 860px; border-bottom: 1px solid var(--border); }
    .hero-label { font-size: 0.75rem; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.75rem; }
    .hero-label::after { content: ''; display: block; width: 2.5rem; height: 1px; background: var(--accent); opacity: 0.5; }
    .hero h1 { font-family: var(--serif); font-size: clamp(2.8rem,6vw,5rem); font-weight: 400; line-height: 1.1; letter-spacing: -0.02em; margin-bottom: 1.5rem; }
    .hero h1 em { color: var(--accent); font-style: italic; }
    .hero p { font-size: 1.1rem; line-height: 1.75; color: var(--muted); max-width: 520px; }

    .section-title { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 2.5rem; }

    /* Başvuru */
    .basvuru-section { padding: clamp(3rem,6vw,5rem) clamp(1.5rem,5vw,4rem); max-width: 640px; }
    .basvuru-badge { display: inline-block; font-size: 0.72rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; background: rgba(200,80,42,0.08); border: 1px solid rgba(200,80,42,0.2); color: var(--accent); padding: 0.4rem 0.8rem; border-radius: 2px; margin-bottom: 1.5rem; }
    .basvuru-info { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 2rem; margin-bottom: 2rem; }
    .basvuru-info p { font-size: 0.95rem; line-height: 1.8; color: var(--muted); margin-bottom: 0.75rem; }
    .basvuru-info p:last-child { margin-bottom: 0; }
    .basvuru-alt-not { font-size: 0.85rem; color: var(--muted); line-height: 1.7; }
    .form-btn { display: inline-block; margin-top: 1.5rem; background: var(--accent); color: #fff; text-decoration: none; padding: 0.75rem 1.5rem; border-radius: 3px; font-size: 0.85rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; transition: opacity 0.2s; }
    .form-btn:hover { opacity: 0.85; }

    /* Duyurular */
    .duyurular-section { padding: clamp(3rem,6vw,5rem) clamp(1.5rem,5vw,4rem); max-width: 760px; }
    .duyuru-item { border-bottom: 1px solid var(--border); padding: 2rem 0; opacity: 0; transform: translateY(12px); animation: slideUp 0.4s ease forwards; }
    .duyuru-item:nth-child(1){animation-delay:.05s} .duyuru-item:nth-child(2){animation-delay:.12s} .duyuru-item:nth-child(3){animation-delay:.19s} .duyuru-item:nth-child(4){animation-delay:.26s} .duyuru-item:nth-child(5){animation-delay:.33s}
    .duyuru-item:first-child { padding-top: 0; }
    .duyuru-item:last-child { border-bottom: none; }
    .duyuru-meta { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; }
    .duyuru-badge-type { font-size: 0.68rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; background: var(--border); color: var(--muted); padding: 0.25rem 0.6rem; border-radius: 2px; }
    .duyuru-badge-type.yeni { background: rgba(200,80,42,0.08); color: var(--accent); }
    .duyuru-date { font-size: 0.8rem; color: var(--muted); }
    .duyuru-item h3 { font-family: var(--serif); font-size: 1.25rem; font-weight: 400; margin-bottom: 0.6rem; letter-spacing: -0.01em; }
    .duyuru-item p { font-size: 0.9rem; line-height: 1.75; color: var(--muted); }

    /* Hakkında */
    .hakkinda-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 3rem; padding: 0 clamp(1.5rem,5vw,4rem); }
    .hakkinda-tab { font-size: 0.8rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); padding: 0.75rem 1.5rem; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.2s, border-color 0.2s; }
    .hakkinda-tab:hover { color: var(--ink); }
    .hakkinda-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .hakkinda-panel { display: none; }
    .hakkinda-panel.active { display: block; animation: pageFade 0.3s ease forwards; }
    .hakkinda-section { padding: clamp(3rem,6vw,5rem) clamp(1.5rem,5vw,4rem); max-width: 860px; }
    .hakkinda-intro p { font-size: 1.05rem; line-height: 1.85; color: var(--ink); margin-bottom: 1.25rem; max-width: 640px; }
    .hakkinda-intro p:last-child { margin-bottom: 0; }

    /* Kurallar */
    .toc { padding: 2.5rem clamp(1.5rem,5vw,4rem); border-bottom: 1px solid var(--border); max-width: 860px; }
    .toc-links { display: flex; flex-direction: column; gap: 0.5rem; }
    .toc-links a { font-size: 0.88rem; font-weight: 500; color: var(--ink); text-decoration: none; display: inline-flex; align-items: center; gap: 0.6rem; transition: color 0.2s; width: fit-content; cursor: pointer; }
    .toc-links a:hover { color: var(--accent); }
    .toc-links a::before { content: ''; display: inline-block; width: 1.2rem; height: 1px; background: var(--border); transition: background 0.2s, width 0.2s; }
    .toc-links a:hover::before { background: var(--accent); width: 1.8rem; }
    .rules-section { padding: clamp(3rem,6vw,5rem) clamp(1.5rem,5vw,4rem); max-width: 860px; }
    .rule-chapter { margin-bottom: 4rem; opacity: 0; transform: translateY(16px); animation: slideUp 0.5s ease forwards; }
    .rule-chapter:nth-child(1){animation-delay:.05s} .rule-chapter:nth-child(2){animation-delay:.12s} .rule-chapter:nth-child(3){animation-delay:.19s} .rule-chapter:nth-child(4){animation-delay:.26s} .rule-chapter:nth-child(5){animation-delay:.33s}
    .chapter-header { display: flex; align-items: baseline; gap: 1rem; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
    .chapter-letter { font-family: var(--serif); font-size: 3rem; font-weight: 400; color: var(--border); line-height: 1; flex-shrink: 0; }
    .chapter-title { font-family: var(--serif); font-size: 1.4rem; font-weight: 400; color: var(--ink); letter-spacing: -0.01em; }
    .rule-subsection { margin-bottom: 2rem; }
    .subsection-label { display: inline-block; font-size: 0.7rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.75rem; }
    .rule-block p { font-size: 0.95rem; line-height: 1.85; color: var(--ink); margin-bottom: 0.9rem; }
    .rule-block p:last-child { margin-bottom: 0; }
    .rule-table { overflow-x: auto; margin: 1.25rem 0; border: 1px solid var(--border); border-radius: 4px; }
    .rule-table table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    .rule-table th { text-align: left; font-size: 0.68rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); padding: 0.7rem 1rem; border-bottom: 1px solid var(--border); background: var(--surface); }
    .rule-table td { padding: 0.65rem 1rem; border-bottom: 1px solid var(--border); color: var(--ink); vertical-align: top; line-height: 1.6; }
    .rule-table tr:last-child td { border-bottom: none; }
    .rule-table tr:hover td { background: var(--bg); }
    .puan-list { display: flex; flex-wrap: wrap; gap: 0.4rem; margin: 0.75rem 0 1rem; }
    .puan { font-size: 0.78rem; font-weight: 500; letter-spacing: 0.04em; color: var(--accent); background: rgba(200,80,42,0.08); border: 1px solid rgba(200,80,42,0.2); padding: 0.3rem 0.65rem; border-radius: 2px; }
    .rule-divider { width: 100%; height: 1px; background: var(--border); margin: 0 0 4rem 0; }

    /* İletişim */
    .iletisim-section { padding: clamp(3rem,6vw,5rem) clamp(1.5rem,5vw,4rem); max-width: 640px; }
    .iletisim-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem; }
    @media (max-width: 560px) { .iletisim-grid { grid-template-columns: 1fr; } }
    .iletisim-card { border: 1px solid var(--border); border-radius: 4px; padding: 1.5rem; background: var(--surface); transition: border-color 0.2s; }
    .iletisim-card:hover { border-color: var(--accent); }
    .ic-label { font-size: 0.68rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; }
    .ic-value { font-family: var(--serif); font-size: 1.05rem; color: var(--ink); }
    .ic-value a { color: var(--accent); text-decoration: none; }
    .ic-value a:hover { text-decoration: underline; }
    .iletisim-note { font-size: 0.9rem; line-height: 1.8; color: var(--muted); }

    footer { border-top: 1px solid var(--border); padding: 2rem clamp(1.5rem,5vw,4rem); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
    footer p { font-size: 0.8rem; color: var(--muted); }
    .footer-links { display: flex; gap: 1.5rem; }
    .footer-links a { font-size: 0.8rem; color: var(--muted); text-decoration: none; transition: color 0.2s; cursor: pointer; }
    .footer-links a:hover { color: var(--ink); }

    @media (max-width: 600px) { nav { gap: 1.2rem; } nav a { font-size: 0.75rem; } .chapter-letter { font-size: 2rem; } }
  </style>
</head>
<body>

  <header>
    <a class="logo" onclick="showPage('basvuru')">
      <img src="assets/logo.png" alt="Düşünseli Kitap Kulübü" class="logo-img" />
      <span id="site-adi"></span><span></span>
    </a>
    <nav>
      <a onclick="showPage('basvuru')"   id="nav-basvuru">Başvuru</a>
      <a onclick="showPage('duyurular')" id="nav-duyurular">Duyurular ve Etkinlikler</a>
      <div class="nav-dropdown">
        <a id="nav-hakkinda">Kulüp Hakkında</a>
        <div class="dropdown-menu">
          <a onclick="showHakkinda('genel')">Genel Bilgi</a>
          <div class="dropdown-divider"></div>
          <a onclick="showHakkinda('kurallar')">Kulüp Kuralları</a>
        </div>
      </div>
      <a onclick="showPage('iletisim')" id="nav-iletisim">İletişim</a>
    </nav>
  </header>

  <div id="page-basvuru"   class="page"></div>
  <div id="page-duyurular" class="page"></div>
  <div id="page-hakkinda"  class="page"></div>
  <div id="page-iletisim"  class="page"></div>

  <script src="icerik.js"></script>
  <script>
  // ── Yardımcı render fonksiyonları ──────────────────────

  function hero(etiket, baslik, aciklama) {
    return `<section class="hero">
      <div class="hero-label">${etiket}</div>
      <h1>${baslik.replace(/\n/g, '<br>')}</h1>
      <p>${aciklama}</p>
    </section>`;
  }

  function footer(sol, linkler) {
    const linkHTML = linkler.map(l =>
      l.onclick
        ? `<a onclick="${l.onclick}">${l.yazi}</a>`
        : `<a href="${l.href}" ${l.target ? `target="${l.target}"` : ''}>${l.yazi}</a>`
    ).join('');
    return `<footer><p>${sol}</p><div class="footer-links">${linkHTML}</div></footer>`;
  }

  function renderIcerikBlok(bloklar) {
    return bloklar.map(b => {
      if (b.tip === 'paragraf') return `<p>${b.metin}</p>`;
      if (b.tip === 'tablo') return renderTablo(b);
      if (b.tip === 'puanlar') return `<div class="puan-list">${b.puanlar.map(p => `<span class="puan">${p}</span>`).join('')}</div>`;
      if (b.tip === 'altbolum') return `
        <div class="rule-subsection">
          <span class="subsection-label">${b.etiket}</span>
          <div class="rule-block">${renderIcerikBlok(b.icerik)}</div>
        </div>`;
      return '';
    }).join('');
  }

  function renderTablo(t) {
    const ths = t.basliklar.map(h => `<th>${h}</th>`).join('');
    const trs = t.satirlar.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('');
    return `<div class="rule-table"><table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table></div>`;
  }

  // ── Sayfa render fonksiyonları ─────────────────────────

  function renderBasvuru() {
    const v = ICERIK.basvuru;
    const bilgiHTML = v.bilgiler.map(b => `
      <p><strong>${b.baslik}</strong></p>
      ${b.paragraflar.map(p => `<p>${p}</p>`).join('')}
    `).join('');

    const formBtn = v.formLinki
      ? `<a class="form-btn" href="${v.formLinki}" target="_blank">${v.formButonYazi}</a>`
      : '';

    return hero(v.heroEtiket, v.heroBaslik, v.heroAciklama)
      + `<section class="basvuru-section">
          <div class="basvuru-badge">${v.rozet}</div>
          <div class="basvuru-info">${bilgiHTML}</div>
          <p class="basvuru-alt-not">${v.altNot}</p>
          ${formBtn}
        </section>`
      + footer(ICERIK.site.telif, [
          { href: ICERIK.site.instagram, yazi: 'Instagram', target: '_blank' },
          { onclick: "showPage('iletisim')", yazi: 'İletişim' },
        ]);
  }

  function renderDuyurular() {
    const v = ICERIK.duyurular;
    const duyuruHTML = v.liste.map(d => `
      <div class="duyuru-item">
        <div class="duyuru-meta">
          <span class="duyuru-badge-type ${d.tip === 'yeni' ? 'yeni' : ''}">${d.tip.charAt(0).toUpperCase() + d.tip.slice(1)}</span>
          <span class="duyuru-date">${d.tarih}</span>
        </div>
        <h3>${d.baslik}</h3>
        <p>${d.metin}</p>
      </div>`).join('');

    return hero(v.heroEtiket, v.heroBaslik, v.heroAciklama)
      + `<section class="duyurular-section">${duyuruHTML}</section>`
      + footer(ICERIK.site.telif, [
          { href: ICERIK.site.instagram, yazi: 'Instagram', target: '_blank' },
          { onclick: "showPage('basvuru')", yazi: 'Başvuru' },
        ]);
  }

  function renderHakkinda() {
    const v = ICERIK.hakkinda;

    // TOC
    const tocLinks = ICERIK.kurallar.bolumler.map((b, i) =>
      `<a onclick="scrollToRule('${b.id}')">${i + 1} — ${b.baslik}</a>`
    ).join('');

    // Kurallar bölümleri
    const bolumlerHTML = ICERIK.kurallar.bolumler.map((b, i) => `
      <div class="rule-chapter" id="${b.id}">
        <div class="chapter-header">
          <span class="chapter-letter">${b.harf}</span>
          <span class="chapter-title">${b.baslik}</span>
        </div>
        <div class="rule-block">${renderIcerikBlok(b.icerik)}</div>
      </div>
      ${i < ICERIK.kurallar.bolumler.length - 1 ? '<div class="rule-divider"></div>' : ''}
    `).join('');

    return hero(v.heroEtiket, v.heroBaslik, v.heroAciklama)
      + `<div class="hakkinda-tabs">
          <div class="hakkinda-tab active" onclick="switchHakkindaTab('genel')">Genel Bilgi</div>
          <div class="hakkinda-tab" onclick="switchHakkindaTab('kurallar')">Kulüp Kuralları</div>
        </div>
        <div id="panel-genel" class="hakkinda-panel active">
          <section class="hakkinda-section">
            <div class="hakkinda-intro">
              ${v.genelBilgi.map(p => `<p>${p}</p>`).join('')}
              <p>Instagram: <a href="${ICERIK.site.instagram}" target="_blank" style="color:var(--accent);text-decoration:none;font-weight:500;">${ICERIK.site.instagramKullanici}</a></p>
            </div>
          </section>
        </div>
        <div id="panel-kurallar" class="hakkinda-panel">
          <section class="toc">
            <div class="section-title">İçindekiler</div>
            <div class="toc-links">${tocLinks}</div>
          </section>
          <section class="rules-section">${bolumlerHTML}</section>
        </div>`
      + footer(`${ICERIK.site.telif.replace('saklıdır.', 'saklıdır.')} — ${ICERIK.site.sonGuncelleme}`, [
          { href: ICERIK.site.instagram, yazi: 'Instagram', target: '_blank' },
          { onclick: "showPage('basvuru')", yazi: 'Başvuru' },
          { onclick: "showPage('iletisim')", yazi: 'İletişim' },
        ]);
  }

  function renderIletisim() {
    const v = ICERIK.iletisim;
    const kartHTML = v.kartlar.map(k => `
      <div class="iletisim-card">
        <div class="ic-label">${k.etiket}</div>
        <div class="ic-value">${k.link ? `<a href="${k.link}" target="_blank">${k.deger}</a>` : k.deger}</div>
      </div>`).join('');

    return hero(v.heroEtiket, v.heroBaslik, v.heroAciklama)
      + `<section class="iletisim-section">
          <div class="iletisim-grid">${kartHTML}</div>
          <p class="iletisim-note">${v.not}</p>
        </section>`
      + footer(ICERIK.site.telif, [
          { href: ICERIK.site.instagram, yazi: 'Instagram', target: '_blank' },
          { onclick: "showPage('basvuru')", yazi: 'Başvuru' },
        ]);
  }

  // ── Sayfa geçiş fonksiyonları ──────────────────────────

  function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active', 'fade-in'));
    document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
    const target = document.getElementById('page-' + name);
    target.classList.add('active');
    requestAnimationFrame(() => requestAnimationFrame(() => target.classList.add('fade-in')));
    const navLink = document.getElementById('nav-' + name);
    if (navLink) navLink.classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function showHakkinda(tab) {
    showPage('hakkinda');
    switchHakkindaTab(tab);
  }

  function switchHakkindaTab(tab) {
    document.querySelectorAll('.hakkinda-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.hakkinda-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.hakkinda-tab').forEach(t => {
      if (t.getAttribute('onclick') && t.getAttribute('onclick').includes(tab)) t.classList.add('active');
    });
    const panel = document.getElementById('panel-' + tab);
    if (panel) panel.classList.add('active');
  }

  function scrollToRule(id) {
    switchHakkindaTab('kurallar');
    setTimeout(() => {
      const el = document.getElementById(id);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
  }

  // ── Başlangıç ─────────────────────────────────────────

  document.getElementById('site-adi').textContent = ICERIK.site.ad;
  document.getElementById('page-basvuru').innerHTML   = renderBasvuru();
  document.getElementById('page-duyurular').innerHTML = renderDuyurular();
